
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Portfolio Ultra Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
  body {
    margin: 0;
    overflow-x: hidden;
    background: #050510;
    color: white;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }

  section {
    position: relative;
    z-index: 10;
  }

  .glass {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
  }
</style>
</head>

<body>

<!-- THREE JS CANVAS -->
<canvas id="bg"></canvas>

<!-- HERO -->
<section class="h-screen flex items-center justify-center text-center">
  <div class="glass p-10 rounded-3xl">
    <h1 class="text-5xl font-bold">Portfolio 3D</h1>
    <p class="mt-3 text-gray-300">Scroll pour explorer mon univers</p>
  </div>
</section>

<!-- ABOUT -->
<section class="h-screen flex items-center justify-center">
  <div class="glass p-10 rounded-3xl max-w-xl text-center">
    <h2 class="text-3xl font-bold">À propos</h2>
    <p class="mt-4 text-gray-300">
      Développeuse Web & AI, spécialisée en interfaces immersives, React, Three.js et UX moderne.
    </p>
  </div>
</section>

<!-- PROJECTS -->
<section class="h-screen flex items-center justify-center">
  <div class="glass p-10 rounded-3xl text-center">
    <h2 class="text-3xl font-bold">Projets</h2>
    <p class="mt-4 text-gray-300">Sites web, IA, dashboards, UI 3D</p>
  </div>
</section>

<!-- CONTACT -->
<section class="h-screen flex items-center justify-center">
  <div class="glass p-10 rounded-3xl text-center">
    <h2 class="text-3xl font-bold">Contact</h2>
    <p class="mt-4 text-gray-300">Email • LinkedIn • GitHub</p>
  </div>
</section>

<script>
/* =========================
   THREE.JS SCENE
========================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.querySelector("#bg"),
  alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

/* LIGHT */
const light = new THREE.PointLight(0xff00ff, 2);
light.position.set(2, 3, 4);
scene.add(light);

/* OBJECTS */
const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
const material = new THREE.MeshStandardMaterial({
  color: 0xff00ff,
  wireframe: true
});

const torus = new THREE.Mesh(geometry, material);
scene.add(torus);

camera.position.z = 5;

/* PARTICLES */
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 1000;

const posArray = new Float32Array(particlesCount * 3);

for(let i = 0; i < particlesCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 10;
}

particlesGeometry.setAttribute(
  "position",
  new THREE.BufferAttribute(posArray, 3)
);

const particlesMaterial = new THREE.PointsMaterial({
  size: 0.02,
  color: "#ffffff"
});

const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

/* ANIMATION LOOP */
function animate() {
  requestAnimationFrame(animate);

  torus.rotation.x += 0.003;
  torus.rotation.y += 0.005;

  particlesMesh.rotation.y += 0.001;

  renderer.render(scene, camera);
}

animate();

/* =========================
   SCROLL ANIMATIONS
========================= */

gsap.registerPlugin(ScrollTrigger);

gsap.to(torus.rotation, {
  x: 10,
  scrollTrigger: {
    trigger: "body",
    start: "top top",
    end: "bottom bottom",
    scrub: true
  }
});

gsap.to(camera.position, {
  z: 2,
  scrollTrigger: {
    trigger: "section:nth-child(2)",
    start: "top center",
    end: "bottom center",
    scrub: true
  }
});

/* RESPONSIVE */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
